services:
  javalin-template:
    image: local/javalin-template:latest
    env_file:
      - env_files/dev/service.env
      - env_files/dev/otel.env
    ports:
      - "10000"
    networks:
      - develop-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
      mode: replicated
      replicas: 2
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:10000/template/admin/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  nginx:
    image: nginx:latest
    ports:
      - "10001:80"
    volumes:
      - ./env_files/dev/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - develop-network
    depends_on:
      javalin-template:
        condition: service_healthy

networks:
  develop-network:
    external: true
    name: develop