services:
  javalin-template:
    image: local/javalin-template:latest
    container_name: javalin-template
    hostname: docker-local
    env_file:
      - env_files/dev/service.env
      - env_files/dev/otel.env
    ports:
      - "10000:10000"
    networks:
      - develop-network

networks:
  develop-network:
    external: true
    name: develop
